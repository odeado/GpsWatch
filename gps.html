<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ö9¦9 Ubicaci¿«n en tiempo real</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            overflow-x: hidden;
        }

        /* ===== LAYOUT RESPONSIVO ===== */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: clamp(10px, 2vw, 20px);
            gap: clamp(10px, 2vw, 15px);
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        h1 {
            text-align: center;
            color: #00d4ff;
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-bottom: clamp(5px, 1vw, 10px);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        /* ===== GRID RESPONSIVO ===== */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: clamp(10px, 2vw, 15px);
            flex: 1;
        }

        /* En tablet y PC: datos a la izquierda, mapa a la derecha */
        @media (min-width: 768px) {
            .content-grid {
                grid-template-columns: 320px 1fr;
            }
        }

        @media (min-width: 1024px) {
            .content-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        /* ===== CARDS ===== */
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: clamp(12px, 2vw, 20px);
            padding: clamp(12px, 2.5vw, 20px);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: clamp(0.85rem, 2vw, 1rem);
            color: #00d4ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dato { 
            font-size: clamp(0.9rem, 2.2vw, 1.1rem); 
            margin: clamp(8px, 1.5vw, 12px) 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .dato b { 
            color: #00ff88; 
            font-weight: 600;
        }

        .dato .label {
            color: #aaa;
            font-size: clamp(0.8rem, 1.8vw, 0.95rem);
        }

        #estado {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: clamp(0.75rem, 1.8vw, 0.85rem);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .online { 
            background: linear-gradient(135deg, #00ff88, #00cc6a); 
            color: #000; 
            box-shadow: 0 0 15px rgba(0,255,136,0.4);
        }

        .offline { 
            background: linear-gradient(135deg, #ff4444, #cc0000); 
            color: #fff; 
        }

        /* ===== MAPA ===== */
        #mapa {
            width: 100%;
            height: clamp(300px, 50vh, 500px);
            border-radius: clamp(12px, 2vw, 20px);
            z-index: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @media (min-width: 768px) {
            #mapa {
                height: clamp(400px, 60vh, 600px);
            }
        }

        /* ===== PANEL DE ESTADISTICAS EXTRA ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        @media (min-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-item {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: bold;
            color: #00d4ff;
        }

        .stat-label {
            font-size: clamp(0.7rem, 1.5vw, 0.8rem);
            color: #888;
            margin-top: 4px;
        }

        /* ===== TIEMPO ===== */
        .tiempo {
            text-align: center;
            color: #888;
            font-size: clamp(0.75rem, 1.8vw, 0.9rem);
            margin-top: 5px;
            padding: 8px;
        }

        /* ===== BOTONES DE CONTROL ===== */
        .controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 100px;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            font-size: clamp(0.8rem, 1.8vw, 0.9rem);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 212, 255, 0.3);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.96);
            background: rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #ccc;
            border-color: rgba(255,255,255,0.2);
        }

        /* ===== PIN ANIMADO ===== */
        .pin-gps {
            width: 26px;
            height: 26px;
            background: #00ff88;
            border: 3px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(0,255,136, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(0,255,136, 0.6); }
            70%  { box-shadow: 0 0 0 15px rgba(0,255,136, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,136, 0); }
        }

        /* ===== SCROLLBAR PERSONALIZADO ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,212,255,0.3);
            border-radius: 3px;
        }

        /* ===== SAFE AREA (notch, home indicator) ===== */
        @supports (padding: max(0px)) {
            .app-container {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
        }

        /* ===== ORIENTACIü0ê7N HORIZONTAL EN CELULAR ===== */
        @media (max-height: 500px) and (orientation: landscape) {
            .content-grid {
                grid-template-columns: 1fr 1fr;
            }
            #mapa {
                height: 250px;
            }
        }

        /* ===== MODO OSCURO DEL SISTEMA ===== */
        @media (prefers-color-scheme: light) {
            body {
                background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
                color: #1a1a2e;
            }
            .card {
                background: rgba(255,255,255,0.7);
                border-color: rgba(0,0,0,0.1);
            }
            .dato .label { color: #555; }
            .stat-item { background: rgba(0,0,0,0.05); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>ö9¦9 Ubicaci¿«n en tiempo real</h1>

        <div class="content-grid">
            <!-- Panel de datos -->
            <div>
                <div class="card">
                    <div class="card-title">ö9¦6 Datos GPS</div>
                    <div class="dato">
                        <span class="label">Latitud:</span>
                        <b id="lat">--</b>
                    </div>
                    <div class="dato">
                        <span class="label">Longitud:</span>
                        <b id="lon">--</b>
                    </div>
                    <div class="dato">
                        <span class="label">Precisi¿«n:</span>
                        <b id="prec">--</b> <span style="color:#888;font-size:0.8em;">metros</span>
                    </div>
                    <div class="dato">
                        <span class="label">Estado:</span>
                        <span id="estado" class="offline">Desconectado</span>
                    </div>
                </div>

                <div class="card" style="margin-top: 10px;">
                    <div class="card-title">ö9¦4 Estad¿¬sticas</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="velocidad">--</div>
                            <div class="stat-label">km/h</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="altitud">--</div>
                            <div class="stat-label">m s.n.m.</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="satelites">--</div>
                            <div class="stat-label">Sat¿ªlites</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="bateria">--</div>
                            <div class="stat-label">Bater¿¬a %</div>
                        </div>
                    </div>
                    <div class="controls">
                        <button class="btn" onclick="centrarMapa()">ö9¦9 Centrar</button>
                        <button class="btn btn-secondary" onclick="cambiarVista()">ö9³0ä1é5 Vista</button>
                    </div>
                </div>

                <div class="tiempo" id="tiempo">ü0ë3ltima actualizaci¿«n: --</div>
            </div>

            <!-- Mapa -->
            <div class="card" style="padding: 0; overflow: hidden;">
                <div id="mapa"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ===== CONFIGURACIü0ê7N FIREBASE =====
        const firebaseConfig = {
            databaseURL: "https://sensorgps-a3027-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== MAPA LEAFLET =====
        const mapa = L.map('mapa', {
            zoomControl: true,
            attributionControl: false
        }).setView([0, 0], 2);

        // Capa base OpenStreetMap
        const capaBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(mapa);

        // Capa satelital (alternativa)
        const capaSatelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri',
            maxZoom: 19
        });

        let vistaSatelite = false;
        function cambiarVista() {
            if (vistaSatelite) {
                mapa.removeLayer(capaSatelite);
                capaBase.addTo(mapa);
            } else {
                mapa.removeLayer(capaBase);
                capaSatelite.addTo(mapa);
            }
            vistaSatelite = !vistaSatelite;
        }

        // Icono personalizado
        const iconoGPS = L.divIcon({
            className: 'pin-gps',
            iconSize: [26, 26],
            iconAnchor: [13, 13]
        });

        let marcador = null;
        let circuloPrecision = null;
        let primeraVez = true;
        let ultimaPosicion = null;

        function actualizarMapa(lat, lon, precision) {
            const posicion = [lat, lon];
            ultimaPosicion = posicion;

            if (!marcador) {
                marcador = L.marker(posicion, { icon: iconoGPS }).addTo(mapa);
                circuloPrecision = L.circle(posicion, {
                    radius: precision || 10,
                    color: '#00d4ff',
                    fillColor: '#00d4ff',
                    fillOpacity: 0.15,
                    weight: 1
                }).addTo(mapa);
            } else {
                marcador.setLatLng(posicion);
                circuloPrecision.setLatLng(posicion);
                circuloPrecision.setRadius(precision || 10);
            }

            if (primeraVez) {
                mapa.setView(posicion, 17);
                primeraVez = false;
            } else {
                mapa.panTo(posicion);
            }
        }

        function centrarMapa() {
            if (ultimaPosicion) {
                mapa.flyTo(ultimaPosicion, 17, { duration: 1 });
            }
        }

        function formatearTiempo(timestamp) {
            if (!timestamp) return '--';
            const fecha = new Date(timestamp * 1000);
            return fecha.toLocaleString('es-CL', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // ===== ESCUCHAR DATOS EN TIEMPO REAL =====
        db.ref('ubicacion').on('value', (snapshot) => {
            const datos = snapshot.val();
            if (datos) {
                document.getElementById('lat').textContent = datos.lat?.toFixed(6) ?? '--';
                document.getElementById('lon').textContent = datos.lon?.toFixed(6) ?? '--';
                document.getElementById('prec').textContent = datos.precision?.toFixed(1) ?? '--';
                document.getElementById('estado').textContent = 'Conectado';
                document.getElementById('estado').className = 'online';

                // Estad¿¬sticas extra
                document.getElementById('velocidad').textContent = datos.velocidad?.toFixed(1) ?? '--';
                document.getElementById('altitud').textContent = datos.altitud?.toFixed(0) ?? '--';
                document.getElementById('satelites').textContent = datos.satelites ?? '--';
                document.getElementById('bateria').textContent = datos.bateria ?? '--';

                document.getElementById('tiempo').textContent = 
                    'ü0ë3ltima actualizaci¿«n: ' + formatearTiempo(datos.tiempo);

                actualizarMapa(datos.lat, datos.lon, datos.precision);
            } else {
                document.getElementById('estado').textContent = 'Desconectado';
                document.getElementById('estado').className = 'offline';
            }
        });

        // ===== RESPONSIVE: invalidar tamaü0è9o del mapa =====
        window.addEventListener('resize', () => {
            mapa.invalidateSize();
        });
        
        // Invalidar despu¿ªs de que todo cargue
        window.addEventListener('load', () => {
            setTimeout(() => mapa.invalidateSize(), 300);
        });

        // Invalidar cuando cambia orientaci¿«n (muy importante en m¿«vil)
        window.addEventListener('orientationchange', () => {
            setTimeout(() => mapa.invalidateSize(), 300);
        });

        // ===== DETECTAR CONEXIü0ê7N / DESCONEXIü0ê7N =====
        window.addEventListener('online', () => {
            console.log('Conexi¿«n restaurada');
        });
        window.addEventListener('offline', () => {
            document.getElementById('estado').textContent = 'Sin internet';
            document.getElementById('estado').className = 'offline';
        });
    </script>
</body>
</html>
